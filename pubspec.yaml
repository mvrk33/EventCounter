name: daymark
description: DayMark - Day Counter & Tracker
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  hive_flutter: ^1.1.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.2
  flutter_local_notifications: ^17.2.2
  home_widget: ^0.7.0
  share_plus: ^10.0.0
  screenshot: ^3.0.0
  uuid: ^4.4.0
  intl: ^0.19.0
  flex_color_picker: ^3.5.0
  go_router: ^14.0.0
  google_fonts: ^6.2.1
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.5
  csv: ^6.0.0
  package_info_plus: ^8.0.2
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
