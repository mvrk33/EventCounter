name: daymark
description: Event Counter - Day Counter & Tracker
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  hive_flutter: ^1.1.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.2
  flutter_local_notifications: ^17.2.2
  home_widget: ^0.7.0
  share_plus: ^10.0.0
  screenshot: ^3.0.0
  uuid: ^4.4.0
  intl: ^0.19.0
  flex_color_picker: ^3.5.0
  go_router: ^14.0.0
  google_fonts: ^6.2.1
  path_provider: ^2.1.3
  file_picker: ^8.1.2
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.5
  csv: ^6.0.0
  package_info_plus: ^8.0.2
  timezone: ^0.9.4
  url_launcher: ^6.3.1
  cryptography: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/branding/

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: assets/branding/app_logo.png
    background_color: "#1E2A78"
    theme_color: "#5E6AD2"
  windows:
    generate: true
    image_path: assets/branding/app_logo.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/branding/app_logo.png
  image_path: assets/branding/app_logo.png
  remove_alpha_ios: true
  adaptive_icon_background: "#1E2A78"
  adaptive_icon_foreground: assets/branding/app_logo.png
  adaptive_icon_monochrome: assets/branding/app_logo.png

flutter_native_splash:
  color: "#1E2A78"
  color_dark: "#0D1117"
  image: assets/branding/app_logo.png
  image_dark: assets/branding/app_logo.png
  android: true
  ios: true
  web: true
  android_12:
    color: "#1E2A78"
    color_dark: "#0D1117"
    image: assets/branding/app_logo.png
    image_dark: assets/branding/app_logo.png

